<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EletroLouco - Ecommerce</title>
    <link rel="stylesheet" href="../css/style_cadrastro.css">
    <link rel="shortcut icon" href="../imagens/icones/EletroLouco.png" type="image/x-icon">
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                EletroLouco - Cadastro
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    
                    <li><a href="cadastro.html">Cadrasto</a></li>

                    <li><a href="sobre.html">Sobre</a></li>

                    <li><a href="login.html">Login</a></li>

                    <li><a href="carrinho.html"><img src="../imagens/icones/carrinho.png" alt="Carrinho"></a></li>


                </ul>
            </nav>
        </header>

        <section id="cadastro">
            <div id="form">
            <h2>Cadastre seus Dados Pessoais</h2>
            <label for="nome">Nome*</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required><br>

            <label for="sobrenome">Sobrenome*</label>
            <input type="text" id="sobrenome" placeholder="Digite seu sobrenome" required><br>

            <label for="cpf">CPF*</label>
            <input type="text" id="cpf" placeholder="Digite seu CPF com caracteres especiais" required maxlength="14"><br>

            <label for="telefone">Telefone*</label>
            <input type="text" id="telefone" placeholder="Digite seu Telefone com DD" required><br>

            <label for="email">Email*</label>
            <input type="email" id="email" placeholder="Digite seu email" required><br>

            <label for="data">Data Nascimento*</label>
            <input type="date" id="data" placeholder="Digite sua data de nascimento" required><br>

            <label for="cep">CEP*</label>
            <input type="text" id="cep" placeholder="Digite seu cep" required maxlength="9"> <br>

            <label for="endereco">Endereço*</label>
            <input type="text" id="endereco" placeholder="Digite seu Endereço" required><br>

            <label for="numero">Número*</label>
            <input type="text" id="numero" placeholder="Digite o Número" required><br>

            <label for="complemento">Complemento*</label>
            <input type="text" id="complemento" placeholder="Digite o Complemento" required><br>

            <label for="bairro">Bairro*</label>
            <input type="text" id="bairro" placeholder="Digite o Bairro" required><br>

            <label for="cidade">Cidade*</label>
            <input type="text" id="cidade" placeholder="Digite a Cidade" required><br>

           
            <label for="estado">Estado*</label>

            <select id="estado" name="estado" required>
                <option value="">Selecione um estado</option>
            
                <option value="AC">Acre</option>
                <option value="AL">Alagoas</option>
                <option value="AP">Amapá</option>
                <option value="AM">Amazonas</option>
                <option value="BA">Bahia</option>
                <option value="CE">Ceará</option>
                <option value="DF">Distrito Federal</option>
                <option value="ES">Espírito Santo</option>
                <option value="GO">Goiás</option>
                <option value="MA">Maranhão</option>
                <option value="MT">Mato Grosso</option>
                <option value="MS">Mato Grosso do Sul</option>
                <option value="MG">Minas Gerais</option>
                <option value="PA">Pará</option>
                <option value="PB">Paraíba</option>
                <option value="PR">Paraná</option>
                <option value="PE">Pernambuco</option>
                <option value="PI">Piauí</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="RO">Rondônia</option>
                <option value="RR">Roraima</option>
                <option value="SC">Santa Catarina</option>
                <option value="SP">São Paulo</option>
                <option value="SE">Sergipe</option>
                <option value="TO">Tocantins</option>
            </select><br>

            <label for="senha">Senha*</label>
            <input type="password" id="senha" placeholder="Digite a Senha" required><br>

            <label for="confirmasenha">Confirma Senha*</label>
            <input type="password" id="confirmasenha" placeholder="Confirme a Senha" required><br>

            <input type="checkbox" id="promocoes" name="promocoes">
            <label for="promocoes">Deseja receber promoções no WhatsApp?</label> <br>

            <button type="submit">Cadastrar</button>
            <button type="reset">Limpar</button>









            </div>
        </section>

    

        <footer id="rodape">
            <h2>&copy 2026 EletroLouco - Ecommerce Todos os direitos reservados</h2>
            <p>Formas de pagamento: Pix, Cartões de Crédito e Débito</p>
        </footer>

    </main>
    
</body>
</html>
